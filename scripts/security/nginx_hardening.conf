# Nginx security hardening for IBP
# Add these directives to /etc/nginx/sites-available/shtirletzsled.ru
# Then: nginx -t && systemctl reload nginx

# Hide nginx version
server_tokens off;

# Block access to dotfiles (.env, .git, etc.)
location ~ /\. {
    deny all;
    return 404;
}

# Block access to sensitive file extensions
location ~* \.(env|db|sqlite|sqlite3|log|ini|cfg|conf|bak|old|orig|swp)$ {
    deny all;
    return 404;
}

# Block access to Python files
location ~* \.(py|pyc|pyo)$ {
    deny all;
    return 404;
}

# Block access to data directory
location /data/ {
    deny all;
    return 404;
}

# Block access to common sensitive paths
location ~ ^/(config|run|scripts|tests|migrations|__pycache__)/ {
    deny all;
    return 404;
}

# Add Permissions-Policy header at nginx level (belt + suspenders with Flask)
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
