# Nginx security hardening for IBP / СЛЕД
# Copy to /etc/nginx/sites-available/shtirletzsled.ru
# Then: nginx -t && systemctl reload nginx
#
# This file contains ONLY the security directives to add inside
# your existing server { } block. It is NOT a complete nginx config.

# ── 1. Hide nginx version ──
server_tokens off;

# ── 2. Block dotfiles (.env, .git, .gitconfig, .htaccess, etc.) ──
location ~ /\. {
    deny all;
    return 404;
}

# ── 3. Block sensitive file extensions ──
location ~* \.(env|db|sqlite|sqlite3|log|ini|cfg|conf|bak|old|orig|swp|sql|zip|tar|gz)$ {
    deny all;
    return 404;
}

# ── 4. Block Python source files ──
location ~* \.(py|pyc|pyo)$ {
    deny all;
    return 404;
}

# ── 5. Block data/backup/internal directories ──
location /data/ {
    deny all;
    return 404;
}

location ~ ^/(config|run|scripts|tests|migrations|__pycache__|instance|logs|uploads)/ {
    deny all;
    return 404;
}

# ── 6. Block common exploit paths (not our app, return 404 fast) ──
location ~ ^/(phpmyadmin|wp-admin|wp-login\.php|wp-content|wp-includes|xmlrpc\.php|server-status|server-info) {
    return 404;
}

# ── 7. Block backup files by name pattern ──
location ~* (backup|dump|database|\.sql|\.bak) {
    deny all;
    return 404;
}

# ── 8. Security headers at nginx level (belt + suspenders with Flask) ──
# These ensure headers are set even if Flask misses them
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── 9. Limit request body size (matches Flask MAX_CONTENT_LENGTH) ──
client_max_body_size 16m;

# ── 10. Disable unnecessary HTTP methods ──
if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|PATCH)$) {
    return 405;
}
