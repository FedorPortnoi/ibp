[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: deterministic unit tests that do not require network or browser access
    integration: deterministic integration tests that may cross local modules
    external: tests that call third-party services
    live: tests that call deployed services or production-like targets
    e2e: end-to-end browser or workflow tests
    security: security audit checks
    slow: marks tests as slow (deselect with '-m "not slow"')
addopts = -v --tb=short --strict-markers
filterwarnings =
    ignore::DeprecationWarning
