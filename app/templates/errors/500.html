{% extends "base.html" %}
{% block title %}500 — Ошибка сервера{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-24 text-center">
    <div class="text-8xl font-display font-bold text-red-400/20 mb-4">500</div>
    <h1 class="text-2xl font-bold text-text-primary mb-3">Что-то пошло не так</h1>
    <p class="text-text-secondary mb-4">Произошла непредвиденная ошибка. Проблема зафиксирована в журнале.</p>
    <p class="text-text-secondary/60 text-sm mb-8">Детали ошибки сохранены в журнале сервера.</p>
    <div class="flex justify-center space-x-4">
        <a href="javascript:location.reload()" class="btn btn-primary">Повторить</a>
        <a href="/" class="btn btn-secondary">На панель управления</a>
    </div>
</div>
{% endblock %}
