{% extends "base.html" %}
{% block title %}Error — IBP{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-24 text-center">
    <div class="text-6xl mb-6">&#9888;</div>
    <h1 class="text-2xl font-bold text-text-primary mb-3">Error</h1>
    {% if error %}
    <p class="text-text-secondary mb-8">{{ error }}</p>
    {% else %}
    <p class="text-text-secondary mb-8">An unexpected error occurred.</p>
    {% endif %}
    <div class="flex justify-center space-x-4">
        <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
        <a href="/" class="btn btn-primary">Dashboard</a>
    </div>
</div>
{% endblock %}
