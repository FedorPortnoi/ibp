{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-24 text-center">
    <div class="text-8xl font-display font-bold text-red-400/20 mb-4">500</div>
    <h1 class="text-2xl font-bold text-text-primary mb-3">Something Went Wrong</h1>
    <p class="text-text-secondary mb-4">An unexpected error occurred. The issue has been logged.</p>
    {% if error %}
    <div class="bg-bg-panel rounded-lg border border-red-400/20 p-4 mb-8 text-left">
        <p class="text-red-300 text-sm font-mono">{{ error }}</p>
    </div>
    {% endif %}
    <div class="flex justify-center space-x-4">
        <a href="javascript:location.reload()" class="btn btn-primary">Retry</a>
        <a href="/" class="btn btn-secondary">Go to Dashboard</a>
    </div>
</div>
{% endblock %}
