<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBP // ERROR</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <!-- IBP Design System CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 9999;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            background: var(--bg-panel);
            border: 1px solid var(--error);
            border-radius: var(--radius-lg);
            max-width: 500px;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.2);
        }

        .error-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { opacity: 1; }
            92%, 94%, 96% { opacity: 0.3; transform: translateX(-2px); }
            91%, 93%, 95% { opacity: 0.8; transform: translateX(2px); }
        }

        .error-title {
            font-family: var(--font-display);
            font-size: 24px;
            color: var(--error);
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .error-message {
            color: var(--text-dim);
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-md);
            font-family: var(--font-mono);
            font-size: var(--font-size-sm);
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--violet);
            color: var(--violet);
            padding: 12px 30px;
            font-family: var(--font-display);
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            border-radius: var(--radius-md);
            transition: all var(--transition-normal);
        }

        .back-btn:hover {
            box-shadow: var(--glow-violet);
            background: rgba(139, 92, 246, 0.1);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠</div>
        <div class="error-title">SYSTEM ERROR</div>
        <div class="error-message">{{ error or 'An unknown error occurred' }}</div>
        <a href="/phase1/" class="back-btn">◀ RETURN TO START</a>
    </div>
</body>
</html>
