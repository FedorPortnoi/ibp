{#
  Risk Score Widget — small reusable component.
  Usage: {% include 'partials/risk_score_widget.html' %}
  Requires: score (dict with .score, .category_ru, .color, .investigation_id)
#}
{% if score %}
<div class="risk-score-widget inline-flex items-center gap-3 bg-bg-panel border border-white/[0.08] rounded-xl px-4 py-3 cursor-pointer hover:border-accent transition-all"
     onclick="window.location.href='/risk-report/{{ score.investigation_id }}'">
    <!-- Circular score badge -->
    <div class="relative w-14 h-14 flex-shrink-0">
        <svg class="w-14 h-14 -rotate-90" viewBox="0 0 56 56">
            <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(59,79,240,0.15)" stroke-width="4"/>
            <circle cx="28" cy="28" r="24" fill="none"
                    stroke="{{ score.color }}"
                    stroke-width="4"
                    stroke-dasharray="{{ (score.score / 100 * 150.8)|round(1) }} 150.8"
                    stroke-linecap="round"/>
        </svg>
        <span class="absolute inset-0 flex items-center justify-center text-sm font-bold"
              style="color: {{ score.color }}">{{ score.score }}</span>
    </div>
    <!-- Category text -->
    <div class="flex flex-col">
        <span class="text-xs text-text-dim uppercase tracking-wider">Скоринг</span>
        <span class="text-sm font-semibold" style="color: {{ score.color }}">{{ score.category_ru }}</span>
    </div>
</div>
{% endif %}
