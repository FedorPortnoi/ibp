{% extends "base.html" %}
{% block title %}People Search - IBP{% endblock %}

{% block head %}
<style>
    .search-card {
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(17, 10, 31, 0.9) 100%);
        border: 1px solid rgba(139, 92, 246, 0.2);
        border-radius: 16px;
        padding: 24px;
    }

    .result-card {
        background: rgba(17, 10, 31, 0.8);
        border: 1px solid rgba(139, 92, 246, 0.15);
        border-radius: 12px;
        padding: 16px;
        transition: all 0.3s ease;
    }

    .result-card:hover {
        border-color: rgba(139, 92, 246, 0.4);
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(139, 92, 246, 0.15);
    }

    .platform-badge {
        padding: 4px 12px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
    }

    .platform-vk { background: rgba(0, 119, 255, 0.2); color: #4da6ff; }
    .platform-ok { background: rgba(238, 130, 0, 0.2); color: #ff9933; }
    .platform-telegram { background: rgba(0, 136, 204, 0.2); color: #00aaff; }

    .profile-avatar {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(139, 92, 246, 0.3);
    }

    .checkbox-custom {
        accent-color: #8b5cf6;
    }

    .loading-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }

    .stats-badge {
        background: rgba(139, 92, 246, 0.15);
        border: 1px solid rgba(139, 92, 246, 0.3);
        padding: 6px 14px;
        border-radius: 9999px;
        font-size: 13px;
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-white mb-2 font-display">
            <span class="text-violet">People</span> Search
        </h1>
        <p class="text-gray-400">Search across VK, Odnoklassniki, and Telegram by name</p>
    </div>

    <!-- Search Form -->
    <div class="search-card mb-8">
        <form id="search-form">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-4">
                <!-- Name Input -->
                <div class="md:col-span-4">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Full Name</label>
                    <input type="text" id="name"
                           class="w-full px-4 py-3 bg-bg-dark border border-violet-200 rounded-lg text-white placeholder-gray-500 focus:border-violet focus:ring-1 focus:ring-violet outline-none transition"
                           placeholder="Павел Васильев" required>
                </div>

                <!-- City Input -->
                <div class="md:col-span-3">
                    <label class="block text-sm font-medium text-gray-300 mb-2">City (optional)</label>
                    <input type="text" id="city"
                           class="w-full px-4 py-3 bg-bg-dark border border-violet-200 rounded-lg text-white placeholder-gray-500 focus:border-violet focus:ring-1 focus:ring-violet outline-none transition"
                           placeholder="Москва">
                </div>

                <!-- Age Range -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Age From</label>
                    <input type="number" id="age_from" min="1" max="120"
                           class="w-full px-4 py-3 bg-bg-dark border border-violet-200 rounded-lg text-white placeholder-gray-500 focus:border-violet focus:ring-1 focus:ring-violet outline-none transition"
                           placeholder="18">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Age To</label>
                    <input type="number" id="age_to" min="1" max="120"
                           class="w-full px-4 py-3 bg-bg-dark border border-violet-200 rounded-lg text-white placeholder-gray-500 focus:border-violet focus:ring-1 focus:ring-violet outline-none transition"
                           placeholder="65">
                </div>

                <!-- Search Button -->
                <div class="md:col-span-1 flex items-end">
                    <button type="submit"
                            class="w-full px-4 py-3 bg-violet hover:bg-violet-dim text-white font-semibold rounded-lg transition flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Platform Selection -->
            <div class="flex flex-wrap gap-4 items-center">
                <span class="text-sm text-gray-400">Platforms:</span>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="platform_vk" value="vk" checked class="checkbox-custom w-4 h-4 rounded">
                    <span class="text-sm text-gray-300">VK</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="platform_ok" value="ok" checked class="checkbox-custom w-4 h-4 rounded">
                    <span class="text-sm text-gray-300">OK</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="platform_telegram" value="telegram" checked class="checkbox-custom w-4 h-4 rounded">
                    <span class="text-sm text-gray-300">Telegram</span>
                </label>
            </div>
        </form>
    </div>

    <!-- Stats (hidden by default) -->
    <div id="stats" class="mb-6 flex gap-3" style="display: none;">
        <span class="stats-badge text-violet" id="stats-count">0 results</span>
        <span class="stats-badge text-gray-400" id="stats-time">0s</span>
    </div>

    <!-- Results Container -->
    <div id="results"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('search-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const resultsDiv = document.getElementById('results');
    const statsDiv = document.getElementById('stats');

    // Show loading state
    resultsDiv.innerHTML = `
        <div class="text-center py-16">
            <div class="loading-pulse">
                <svg class="w-16 h-16 mx-auto text-violet mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <p class="text-gray-400">Searching across platforms...</p>
        </div>
    `;
    statsDiv.style.display = 'none';

    // Gather selected platforms
    const platforms = [];
    if (document.getElementById('platform_vk').checked) platforms.push('vk');
    if (document.getElementById('platform_ok').checked) platforms.push('ok');
    if (document.getElementById('platform_telegram').checked) platforms.push('telegram');

    const searchData = {
        name: document.getElementById('name').value.trim(),
        city: document.getElementById('city').value.trim() || null,
        age_from: document.getElementById('age_from').value || null,
        age_to: document.getElementById('age_to').value || null,
        platforms: platforms
    };

    try {
        const startTime = Date.now();
        const response = await fetch('/api/search/people', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(searchData)
        });

        const data = await response.json();
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

        if (data.error) {
            resultsDiv.innerHTML = `
                <div class="search-card text-center py-8">
                    <svg class="w-12 h-12 mx-auto text-red-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                    <p class="text-red-400">${data.error}</p>
                </div>
            `;
            return;
        }

        // Show stats
        const stats = data.stats || {};
        statsDiv.style.display = 'flex';
        document.getElementById('stats-count').textContent = `${stats.total_found || 0} results`;
        document.getElementById('stats-time').textContent = `${stats.search_time || elapsed}s`;

        // Render results
        const profiles = data.profiles || [];
        if (profiles.length === 0) {
            resultsDiv.innerHTML = `
                <div class="search-card text-center py-8">
                    <svg class="w-12 h-12 mx-auto text-gray-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M12 12h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-gray-400 mb-2">No profiles found</p>
                    <p class="text-sm text-gray-500">Try different name spelling or fewer filters</p>
                    ${data.status === 'pending' ? '<p class="text-sm text-violet mt-4">Search service initializing...</p>' : ''}
                </div>
            `;
            return;
        }

        let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';
        profiles.forEach(profile => {
            const platformClass = {
                'vk': 'platform-vk',
                'ok': 'platform-ok',
                'telegram': 'platform-telegram'
            }[profile.platform] || 'bg-gray-700 text-gray-300';

            const platformName = {
                'vk': 'VK',
                'ok': 'OK',
                'telegram': 'TG'
            }[profile.platform] || profile.platform;

            html += `
                <div class="result-card">
                    <div class="flex items-start gap-4">
                        ${profile.photo_url
                            ? `<img src="${profile.photo_url}" alt="" class="profile-avatar" onerror="this.style.display='none'">`
                            : `<div class="w-16 h-16 rounded-full bg-violet-200 flex items-center justify-center">
                                <svg class="w-8 h-8 text-violet" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                               </div>`
                        }
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold text-white truncate">${profile.display_name || 'Unknown'}</h3>
                            <p class="text-sm text-gray-400 truncate">@${profile.username || 'N/A'}</p>
                            <div class="flex flex-wrap gap-2 mt-2">
                                <span class="platform-badge ${platformClass}">${platformName}</span>
                                ${profile.city ? `<span class="text-xs text-gray-500">${profile.city}</span>` : ''}
                                ${profile.age ? `<span class="text-xs text-gray-500">${profile.age} y.o.</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <a href="${profile.url}" target="_blank" rel="noopener noreferrer"
                           class="flex-1 px-3 py-2 bg-violet-200 hover:bg-violet-400 text-violet text-sm font-medium rounded-lg text-center transition">
                            View Profile
                        </a>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        resultsDiv.innerHTML = html;

    } catch (error) {
        resultsDiv.innerHTML = `
            <div class="search-card text-center py-8">
                <svg class="w-12 h-12 mx-auto text-red-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <p class="text-red-400">Search failed: ${error.message}</p>
            </div>
        `;
    }
});
</script>
{% endblock %}
