<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBP - Требуется авторизация</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #030014;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(17, 10, 31, 0.95);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            padding: 40px;
            box-shadow:
                0 0 40px rgba(139, 92, 246, 0.1),
                0 0 80px rgba(139, 92, 246, 0.05);
            backdrop-filter: blur(10px);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        .logo h1 {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #8b5cf6, #a78bfa, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .logo p {
            color: #6b7280;
            font-size: 13px;
            margin-top: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #9ca3af;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .password-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(3, 0, 20, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .password-input:focus {
            border-color: rgba(139, 92, 246, 0.6);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        }

        .password-input::placeholder {
            color: #4b5563;
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .remember-row input[type="checkbox"] {
            accent-color: #8b5cf6;
            width: 16px;
            height: 16px;
        }

        .remember-row label {
            color: #6b7280;
            font-size: 13px;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #6d28d9, #7c3aed);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #f87171;
            font-size: 14px;
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #374151;
            font-size: 11px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .logo-icon {
            animation: pulse 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <span class="logo-icon">&#x1f512;</span>
                <h1>IBP</h1>
                <p>Требуется авторизация</p>
            </div>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" class="password-input"
                           placeholder="Введите мастер-пароль" autofocus required>
                </div>

                <div class="remember-row">
                    <input type="checkbox" name="remember" id="remember" value="1">
                    <label for="remember">Запомнить на 30 дней</label>
                </div>

                <button type="submit" class="login-btn">Войти</button>
            </form>
        </div>

        <div class="footer">
            IBP - Платформа OSINT-расследований | Только авторизованный доступ
        </div>
    </div>
</body>
</html>
