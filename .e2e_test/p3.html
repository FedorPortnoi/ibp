<script>
var hiddenCourts = [];
var hiddenRegions = [];
jQuery(document).ready(function() {

    $("#tree").aciTree({
        ajax: {
            url: "/loadCourtTree/simple"
        },
        checkbox: true,
        collapse: true,
        animateRoot: false
    });

    $('#tree').on('acitree', function(event, api, item, eventName, options) {
        switch (eventName) {
            case 'checked':
            case 'unchecked':
            case 'loaded':
                hiddenCourts = [];
                hiddenRegions = [];
                api.branch(null, function(item) {
                    if(api.isChecked(item)) {
                        if(api.hasChildren(item)) {
                            hiddenRegions.push('<input type="hidden" name="simpleSearch[region][]" value="'+api.getId(item)+'">');
                        } else {
                            hiddenCourts.push('<input type="hidden" name="simpleSearch[court][]" value="'+api.getId(item)+'">');
                        }
                    }
                });
                break;
        }
    });

    $("#search-form").submit(function(event) {
        $(this).append(hiddenCourts.join(''));
        $(this).append(hiddenRegions.join(''));
    });
});
</script>
