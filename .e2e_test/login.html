<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СЛЕД — Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #f0f1fa;
            font-family: 'Outfit', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            width: 100%;
            max-width: 380px;
            padding: 48px 36px;
            margin: 20px;
            background: #111118;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
        }
        .brand {
            text-align: center;
            margin-bottom: 36px;
        }
        .brand h1 {
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.02em;
        }
        .brand p {
            font-family: 'IBM Plex Mono', monospace;
            color: #55566a;
            font-size: 11px;
            margin-top: 6px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .error {
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.2);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #f87171;
            font-size: 14px;
            text-align: center;
        }
        label {
            display: block;
            font-family: 'IBM Plex Mono', monospace;
            color: #55566a;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            background: #050508;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: #f0f1fa;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input[type="password"]:focus {
            border-color: #3b4ff0;
            box-shadow: 0 0 0 3px rgba(59,79,240,0.1);
        }
        input[type="password"]::placeholder { color: #3a3b4a; }
        button {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            background: #3b4ff0;
            border: none;
            border-radius: 100px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
        }
        button:hover {
            background: #2a3cd4;
            box-shadow: 0 0 40px rgba(59,79,240,0.3);
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-family: 'IBM Plex Mono', monospace;
            color: #3a3b4a;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <h1>СЛЕД</h1>
            <p>Требуется авторизация</p>
        </div>
        
        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="IjJkYWE0NjBjOGE4MTM3N2YwYWExMGQ4NTc2NTMyMWUzYThhMTFhMjki.absrnA.EkDAebKDxIrMhux4KoHguMsaPW8"/>
            <label for="password">Пароль</label>
            <input type="password" name="password" id="password" placeholder="Введите пароль" required autofocus>
            <button type="submit">Войти</button>
        </form>
        <div class="footer">Authorized Use Only</div>
    </div>
</body>
</html>
